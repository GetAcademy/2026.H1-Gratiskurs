<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas mal</title>
    <style>
        canvas {
            border: 1px solid black;
        }

        img {
            display: none;
        }
    </style>
</head>

<body onload="init()">
    <img id="skog" src="../img/skog2.jpg" />
    <img id="bird" src="../img/flappyBird.png" />
    <canvas id="canvas" width="600" height="600"></canvas>

    <script>
        const c = document.getElementById('canvas');
        const ctx = c.getContext('2d');

        let imgBackground;
        let imgBird;
        let canvasWidth = c.width;
        let canvasHeight = c.height;
        let backgroundX = 0;
        const backgroundWidth = 1798;
        let rectX = canvasWidth / 4;
        let rectY = canvasHeight / 2;
        let speedX = 0;
        let speedY = 0;
        let gravity = 0.5;
        let pipeX = canvasWidth;
        let pipeSpeedX = -2;
        const rectWidth = 100;
        const rectHeight = rectWidth * 446 / 630;
        const pipeWidth = 100;
        const pipeHeight = 150;

        function init() {
            imgBackground = document.getElementById("skog");
            imgBird = document.getElementById("bird");
            gameLoop();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // sprette i nedre vegg?
            if (rectY + rectHeight > canvasHeight && speedY > 0) {
                speedY = -speedY;
            } else {
                rectX += speedX;
                rectY += speedY;
            }
            speedY += gravity;

            backgroundX--;
            if (backgroundX < -backgroundWidth) {
                backgroundX += backgroundWidth;
            }

            pipeX += pipeSpeedX;
            if (pipeX < -pipeWidth) {
                pipeX = canvasWidth;
                // pipeSpeedX--;
            }
        }

        function draw() {
            ctx.drawImage(imgBackground, backgroundX, 0);
            ctx.drawImage(imgBackground, backgroundX + backgroundWidth, 0);
            drawPipes();
            drawFlappyBird();
        }

        function drawPipes() {
            ctx.fillStyle = 'yellow';
            ctx.fillRect(pipeX, 0, pipeWidth, pipeHeight);
            ctx.fillRect(pipeX, canvasHeight - pipeHeight, pipeWidth, pipeHeight);
        }

        function drawFlappyBird() {
            drawRect(rectX, rectY, `white`);
            ctx.drawImage(imgBird, rectX, rectY, rectWidth, rectHeight);
        }

        function drawRect(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, rectWidth, rectHeight);
        }
    </script>
</body>

</html>
